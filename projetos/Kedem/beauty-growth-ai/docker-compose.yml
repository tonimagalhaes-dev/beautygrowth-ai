version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: beautygrowth-postgres
    environment:
      POSTGRES_USER: beautygrowth
      POSTGRES_PASSWORD: beautygrowth_dev
      POSTGRES_DB: beautygrowth_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U beautygrowth -d beautygrowth_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beautygrowth-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: beautygrowth-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'timeout 2 bash -c "echo > /dev/tcp/localhost/6333" || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: beautygrowth-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: beautygrowth
      MINIO_ROOT_PASSWORD: beautygrowth_dev
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  langgraph:
    build:
      context: ./langgraph-service
      dockerfile: Dockerfile
    container_name: beautygrowth-langgraph
    environment:
      GRPC_PORT: '50051'
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://beautygrowth:beautygrowth_dev@postgres:5432/beautygrowth_dev
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_DB: beautygrowth_dev
      POSTGRES_USER: beautygrowth
      POSTGRES_PASSWORD: beautygrowth_dev
      QDRANT_HOST: qdrant
      QDRANT_PORT: '6333'
      LOG_LEVEL: info
      SERVICE_VERSION: 0.1.0
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    ports:
      - '50051:50051'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', 'import socket; s=socket.socket(); s.settimeout(2); s.connect(("localhost", 50051)); s.close()']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
